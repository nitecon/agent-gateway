# On a GitHub release: wrap the published linux binary in an image, push to the
# internal registry, and roll the k8s deployment. Runs on the x1 local-backend
# agent (has docker/kubectl/registry). All internal values are Woodpecker
# secrets (registry_url is a global secret) — nothing internal lives in this
# public repo.
when:
  - event: release
labels:
  backend: local
  hostname: x1
steps:
  - name: build-push-deploy
    image: bash
    environment:
      REGISTRY:
        from_secret: registry_url
      K8S_NS:
        from_secret: k8s_namespace
      DEPLOYMENT:
        from_secret: deployment_name
    commands:
      - export HOME=/home/eventic
      - 'IMG="$REGISTRY/agent-gateway:$CI_COMMIT_TAG"'
      - 'echo "deploying $CI_COMMIT_TAG -> $IMG"'
      - 'curl -fsSL --retry 5 --retry-delay 10 -o gw.tgz "https://github.com/nitecon/agent-gateway/releases/download/$CI_COMMIT_TAG/agent-gateway-$CI_COMMIT_TAG-linux-x86_64.tar.gz"'
      - 'tar -xzf gw.tgz'
      - 'BIN=$(find . -type f -name gateway | head -1); install -m0755 "$BIN" ./gateway'
      - 'docker build -f deploy/Dockerfile -t "$IMG" .'
      - 'docker push "$IMG"'
      - 'kubectl set image "deployment/$DEPLOYMENT" "gateway=$IMG" -n "$K8S_NS"'
      - 'kubectl rollout status "deployment/$DEPLOYMENT" -n "$K8S_NS" --timeout=300s'
